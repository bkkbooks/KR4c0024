body:
  text: 常建詩卷二唐常建撰五言古詩宿五度溪仙人得道處五度溪上花生根依兩崖二月尋片雲願宿秦人家上見懸崖崩下見白水湍仙人彈碁處石上青蘿盤無處求玉童翳翳惟林巒前溪遇新月聊取玉琴彈西山一身為輕舟落日西山際常隨去帆影逺接長天勢物象歸餘清林巒分夕麗亭亭碧流暗日入孤霞繼洲渚逺隂映湖雲尚明霽林昏楚色來岸逺荆門閉至夜轉清逈蕭蕭北風厲沙邉雁鷺泊宿處蒹葭蔽圓月逗前浦孤琴又搖曳泠然夜遂深白露霑人衣春詞階下草猶短牆頭梨花白織女髙樓上停梭顧行客問君在何所青鳥舒錦翮贈三侍御髙山臨大澤正月蘆花乾陽色薰兩崖不改青松寒士賢守孤貞古來皆共難明君錯甚一作任才臺上飛三鸞操與雪霜明量與江海寬東身視天涯安能窮波瀾孤鶴在枳棘一枝非所安逸翮望絶霄見欲凌雲端層臺何其髙山石流洪湍固知非天池鳴躍同所歡誰念獨枯槁四十長江干責躬貴知已效拙從一官折翮悲髙風苦飢候朝餐湖月映大海天空何漫漫托身未知所謀道庶不刋吟彼喬木詩一夕常三歎第三峰西山第三頂茅宇依雙松杳杳欲至天雲梯升幾重瑩魄澄玉虛以求鸞鶴蹤逶迤非天人執節乘赤龍旁映白日光縹眇輕霞容孤輝上烟霧餘影明心胸願與黃麒麟欲飛而莫從因寂清萬象輕雲自中峰山暝學棲鳥月來隨暗蛬尋空靜餘響嫋嫋雲溪鐘古興漢上逄老翁江口為僵尸白髮沾黃泥遺骸集烏鴟機巧自此忘精魄今何之風吹釣竿折魚躍安能施白水明汀洲菰蒲冒深陂唯留扁舟影繫在長江湄突兀枯松枝悠揚女蘿絲託身難慿依生死焉相知遍觀今時人舉世皆爾為將軍死重圍漢卒猶爭馳百馬同一銜萬輪同一規名與身孰親君子宜固思髙樓夜彈筝髙樓百餘尺直上江水平明月照人苦開簾彈玉笋山髙猿狖急天靜鴻雁鳴曲度由未終東峰霞半生客有自燕而歸哀其老而贈之羸馬朝自燕一身為二連憶親拜孤塜移葬雙陵前幽願從此畢劒心因獲全孟冬寒氣盛撫轡告言旋碣石海北門餘冦惟朝鮮離離一寒騎嫋嫋馳白天生别皆自取况為士卒先寸心漁陽興落日旌竿懸白龍窟泛舟寄天台學道者夕映翠山深餘暉在龍窟扁舟滄浪意淡淡花影沒西浮入天色南望對雲闕因憶莓苔峰初陽濯𤣥髮泉蘿兩幽映松鶴間清越碧海瑩子神玉膏澤人骨忽然為枯木微興遂如兀應寂中有天明心外無物環回從所泛夜靜猶不歇淡然意無限身與波上月張天師草堂靈溪宴清宇傍倚枯松根花藥繞方丈瀑泉飛至門四氣閉炎熱兩崖改明昏夜深月暫皎亭午朝始暾信是天人居幽幽寂無喧萬壑應鳴磬諸峰接一魂遂登闕子闕因闕田生樽時節開玉書窅映飛天言心化便一作更無影目精焉纍煩忽而與一作舉霄漢寥落空南軒古意三首二妃方訪舜萬里南方懸逺道隔江漢孤舟無嵗年不知蒼梧處氣盡呼青天愁淚變楚竹蛾眉喪湘川後人立為廟纍世稱其賢過客設祠祭狐狸來坐邉懷古未忍還猿吟徹空山明月照髙閣綵女褰羅幕歌舞臨碧雲簫聲沸珠箔青鸞臨南海天上雙白鶴萬里齊翼飛意求君門樂玉霄九重閉金鎖夜不開兩翅自無力愁鳴雲外來態深入空貴世屈無良媒俯仰顧中禁東飛白玉臺楚王竟何去獨自留巫山偏使世人見迢迢江漢間駐舟春溪裏皆願拜靈顔寤寐見神女金紗鳴珮環閒艷絶世姿令人氣力微含笑竟不語化作朝雲飛漁浦春至百草緑陂澤聞鶬鶊别家投釣翁今世滄浪情漚紵為緼袍折麻為長纓榮譽失本真怪人浮此生碧水月自濶安流淨而平扁舟與天際獨往誰能名空靈山應田叟湖南無村落山舍多黃茆淳朴如太古其人居鳥巢牧童唱巴歌野老亦獻嘲泊舟問溪口言語皆啞咬土俗不尚農豈暇論肥埆莫徭射禽獸浮客烹魚鮫余亦罘罝人獲麋今尚苞敬君中國來願以充其庖日入聞虎鬭空山滿哮一作咆哮懷人雖共安異域終難交白水可洗心采薇可為殽拽䇿皆落日江風鳴梢梢太公哀晚遇日出渭流白文王畋獵時釣翁在蘆葦川澤無熊羆詔書起遺賢匹馬令一作今致辭因稱江海人臣老筋力衰遲遲詣天車怏怏悟靈龜兵馬更不獵君臣皆共怡同車至咸陽心影無磷緇四牡玉墀下一言為帝師王侯擁朱門軒蓋曜長逵古來榮華人遭遇誰知之落日懸桑榆光景有頓虧倐悲一作忽天地人雖貴將何為昭君墓漢宫豈不死異域傷獨沒萬里䭾黃金蛾眉為枯骨回車一作軍夜出塞立馬皆不發共恨丹青人墳上哭明月弔王將軍墓嫖姚北伐時深入强一作幾千里戰餘落日黃軍敗鼓聲死嘗聞一作言漢飛將可奪單于壘今與山鬼鄰殘兵哭遼水常建詩卷二
