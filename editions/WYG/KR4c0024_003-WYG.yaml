body:
  text: 常建詩巻三唐常建撰五言律詩題破山寺後禪院清晨入古寺初日照一作朗髙林竹逕通一作遇幽處禪房花木深山光悦鳥性潭影空人心萬籟此都一作俱寂但餘一作惟聞鐘磬音送李大都䕶單于雖不戰都䕶事邉深君執幕中秘能為髙士心海頭近初月磧裏多愁隂西望郭猶子将分淚滿襟潭州㽞别賢達不相識偶然交巳深宿㠶謁郡佐悵别依禪林湘水流入海楚雲千里心望君杉松夜山月清猿吟聼琴秋夜贈冦尊師琴當秋夜聼况是洞中人一指指應法一聲聲爽神寒蟲臨砌黙一作急清吹褭燈頻何必鍾期耳髙閒自可親泊舟盱眙泊舟淮水次霜降夕流清夜久潮侵岸天寒月近城平沙依雁宿候館聼雞鳴鄉國雲霄外誰堪覊旅情江行平湖四無際此夜泛孤舟明月異方意呉歌令客愁鄉園碧雲外兄弟淥江頭萬里無歸信偒心看斗牛讌居青苔常滿路流水復入林逺與市朝隔日聞鷄犬深寥寥丘中想𣺌𣺌湖上心嘯傲轉無欲不知成陸沉七言古詩古意井底玉氷洞地明琥珀轆轤青絲索仙人騎鳳披彩霞挽上銀瓶照天閣黄金作身雙飛龍口銜明月噴芙蓉一時渡海望不見曉上青樓十二重古興轆轤井上雙梧桐飛鳥銜花日将没深閨女兒莫愁年玉指泠泠怨金碧石榴裙裾蛺蝶飛見人不語顰蛾眉青絲素絲紅綠絲織女一作成錦衾當為誰七言絶句送宇文六花映垂楊漢水清㣲風林裏一枝輕即今江北還如此愁殺江南離别情落第長安家園好在尚一作住上㽞秦恥作明時失路人恐逢故里鶯花笑且向長安度一春塞下鐡馬胡裘出漢營分麾百道救龍城左賢未遁兵一作斬旌竿折過在将軍不在兵題法院勝景門閒對逺山竹深松老半含烟皓一作素月殿中三度磬水晶宫裏一僧禪嶺猿杳杳褭一作凄褭清且切鷓鴣飛處又斜陽相思嶺上相思淚不到三聲合斷腸三日尋李九荘雨歇楊林東渡頭永和三日盪輕舟故人家在桃花岸直到門前溪水流塞下曲四首玉帛朝囬望帝鄉烏孫歸去不稱王天涯静處無征戰兵氣銷為日月光北海隂風動地來明君祠上望龍堆髑髏皆是長城卒日暮沙場飛作灰龍鬭雌雄勢巳分山崩鬼哭恨将軍黄河直北千餘里寃氣蒼茫成黒雲因嫁單于怨在邉蛾眉萬古𦵏胡天漢家此去三千里青塚常無草木烟戲題湖上湖上老人坐磯一作島頭湖裏桃花水却流竹竿嫋嫋波無一作白波際不知何者吞吾鈎常建詩巻三
