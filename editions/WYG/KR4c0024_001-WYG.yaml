body:
  text: 常建詩巻一唐常建撰五言古詩送陸擢聖代多才俊一作秀陸生何考槃南山髙松樹不合空摧殘九月湖上别北風秋雨寒殷勤歎孤鳳早食金琅玕送李十一尉臨溪泠泠花下琴君唱渡江吟天際一㠶影預懸離别心以言神仙尉因致瑶華音回軫撫商調越溪澄碧林江上琴興江上調玉琴一絃清一心泠泠七絃遍萬木澄幽隂一作音能使江月白又令江水深始知梧一作枯桐枝可以徽黄金湖中晚齊湖廣舟自輕江天欲澄霽是時清楚望氣色猶霾曀踟蹰金霞白波上日初麗烟虹落鏡中樹木生天際杳杳涯欲辨䝉䝉雲復閉言乗星漢明又覩寰瀛勢㣲興從此惬悠然不知嵗試歌滄浪清遂覺乾坤細豈容客衣薄将期永投袂遲回漁父間一鴈聲嘹唳宿王昌齡隱居清溪深不測一作極隱處唯孤雲松際露㣲月清光猶為君茅亭宿花影藥院滋苔紋余亦謝時去西山鸞鶴羣送楚十少府㣲風吹霜氣寒影明一作流前除落日未能别蕭蕭林木虛愁烟閉千里仙尉其何如因送别鶴操贈之雙鯉魚鯉魚在金盤别鶴哀有餘心事則如此請君開素書張山人彈琴君去芳草綠西峰彈玉琴豈惟丘中賞兼得清煩襟朝從山口還出嶺聞清一作幽音了然雲霞氣一作意照見天地心𤣥鶴下澄空翩翩舞松林改絃扣一作和商聲又聼飛龍吟稍覺此身妄漸知仙事深其将錬金鼎永矣一作以投吾簪白湖寺後溪宿雲門落日山水清亂流鳴淙淙舊蒲雨抽節新花水對窗溪中日已沒歸鳥多為雙杉松引直路出谷臨前湖洲渚晚色静又觀花與蒲入溪復登嶺草淺寒流速圓月明髙峰春山因獨宿松隂澄初夜曙色分逺目日出城南隅青青媚川陸亂花覆東郭碧氣銷長林四郊一清影千里歸寸心前瞻王一作去程促却戀雲門深畢景有餘興到家彈玉琴閒齋卧病行藥至山館稍次湖亭二首旬時結隂霖簾外初白日齋沐清病容心魂畏虚室閒梅照前户明鏡悲舊質同袍四五人何不來問疾行藥至石壁東風變萌芽主人門外一作山門綠小隱湖中花時物堪獨往春㠶宜别家辭君嚮滄海爛熳從天涯塞上曲翩翩雲中使來間太原卒百戰苦不歸刀頭怨明月塞雲隨陣落寒日旁城沒城下有寡妻哀哀哭枯骨仙谷遇毛女意知是秦宫人溪口水石淺泠泠明藥􅓜入溪雙峰峻松栝疎幽風垂嶺一作竹枝嫋嫋翳泉花濛濛夤緣霽人目路盡心彌通盤石横陽崖前流一作臨殊未窮回潭清雲影瀰漫長天空水邉一神女千嵗為玉童羽毛經漢代珠翠逃秦宫目覿神已寓鶴飛言未終祈君青雲秘願謁黄仙翁嘗以耕玉田龍鳴西頂中金梯與天接幾日來相逢夢太白西峰夢寐昇九崖杳靄逢元君遺我太白峰一作岑寥寥辭垢氛結宇在星漢宴林閉氤氲簷楹覆餘翠巾舄生片雲時往溪水一作谷間孤亭晝仍曛松峰引天影石瀨清霞文恬目緩舟趣霽心投鳥羣春風又揺櫂潭島花紛紛鄂渚招王昌齡張僨刈蘆曠野中沙上飛黄雲天晦無精光茫茫逺悲君楚山隔湘水湖畔落日曛春鴈又北飛音書固難聞謫居未為歎讒枉何由分午日逐蛟一作蛇龍宜為弔寃文翻覆古共然名宦安足云貧士任枯槁捕魚清江濆有時荷鉏犁曠野自耕耘不然春山隱溪澗花一作何氤氲山鹿自有場賢達亦顧羣二賢歸去來世上徒紛紛春詞二首菀菀黄桞絲濛濛雜花垂日髙紅粧卧倚對一作樹春光一作風遲寧知傍淇水騕褭黄金覊翳翳陌上桑南枝交北堂美人金梯出素手自提筐非但畏一作為蠶飢盈盈嬌路傍張公子行一作古意日出乗釣舟嫋嫋持釣竿渉淇傍荷花驄馬閑金鞍俠客白雲中腰間懸轆轤出門事嫖姚為君西擊胡胡兵漢騎相馳逐轉戰孤軍西海北一作曲百尺旌竿沉黒雲邉笳落日不堪聞晦日馬鐙曲稍次中流作夜寒宿蘆葦曉色明西林初日在川上便澄㳺子心秦一作晴天無纎翳郊野浮春隂波靜隨釣魚舟小綠水深出浦見千里曠然諧逺尋扣船應漁父因一作同唱滄浪吟古意牧馬古道傍道傍多古墓蕭條愁殺人蟬鳴白楊樹廻頭望京邑合㳫生塵霧富貴安可常歸來保貞素常建詩巻一
