body:
  text: 常建詩别集類一唐提要臣等謹案唐常建不知其字其里貫亦無可考據陳振孫書録解題知為開元十五年進士終於盱眙尉而已詩家但稱曰常尉從其官也唐書藝文志載常建詩一卷此本三卷乃毛晉汲古閣所刋云不知何人類而析之據文獻通考作於宋末元初尚作一卷則元明間人所分矣殷璠作河嶽英靈集去取至為精核肅代之間所録僅二十四人以建為冠載詩僅二百三十四首而建詩居十五首其序稱劉楨死於文學左思終於記室鮑照卒於恭軍常建亦淪於一尉深用悲惋又稱其松際露微月清光猶為君山光悅鳥性潭影空人心諸句而尤推弔王將軍墓一篇以為善叙悲怨勝於潘嶽今觀其集凡詩五十七首所與贈答者今率莫考其姓字其中最知名者惟王昌齡者一人而亦僅一篇為宿其隱居一篇為招與張僨共隱則非惟宦途寂寞守道無營即唱和交遊亦泊然於名場聲氣之外不然則李白與昌齡最契髙適王之涣等亦與昌齡旗亭畫壁同作俊遊建亦何難因緣牽附以博一時之譽哉其人品如是則詩品之髙固其所矣其詩自殷璠所稱外歐陽修題青州山齊又極賞其曲徑通幽處禪房花木深之句稱欲效其語久不可得案修集本作竹徑過幽處蓋一時誤記姚寬西溪􅓜語已辨之今據建集改正附識於此然全集之中卓然與王孟抗行者殆十之六七不但二人所稱也洪邁萬首絶句别載建吳故宫一首此集不載語亦不類邁所編舛誤至多不盡足據今亦不復增入焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f8a75105374f23fb778a210e78d0819d07baf8eb75d7b914a01d71a84d900789
