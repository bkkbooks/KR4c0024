body:
  text: 常建詩附録河嶽英靈集云高才無貴士誠哉是言曩劉楨死於文學左思終於記室鮑昭卒於參軍今常建亦淪於一尉悲夫建詩似初發通莊却尋野徑百里之外方歸大道所以其㫖逺其興僻佳句輒來唯論意表至如松際露微月清光猶為君又山光悅鳥性潭影空人心此例十數句並可稱警策然一篇盡善者戰餘落日黃軍敗鼓聲死今與山鬼鄰殘兵哭遼水屬思既苦詞亦警絶潘嶽雖云能叙悲怨未見如此章歐陽公臨行題青州山齊曰吾常喜誦常建詩云竹徑遇幽處禪房花木深欲效其語作一聯久不可得乃知造意者難為工也晚來青州始得山齊宴息乃謂不意平生想見而不能道以言者乃為巳有於是益欲希其髣佛竟爾莫獲一言夫前人為開其端其物景又在其目然不得自稱其懷豈人才有限而不可彊吾將老矣文思之衰耶兹為終身之恨爾熙寧庚戌仲夏望日題姚寬西溪􅓜語曰常建題破山寺後院詩云竹徑通幽處禪房花木深余觀又𤣥集唐詩類選皆作通熙寧元年歐陽永叔守青州題廨宇後山齊云竹徑遇幽處有以杜石本往河內以見邢和叔始末見時亦頗疑其誤及見碑反覆味之亦以為佳不知别有本耶抑永叔自改耶古人用一字不茍也常建詩跋常建字無考開元十五年進士大厯中為盱眙尉丹陽進士殷璠選河嶽英靈集起甲寅終癸巳上下四十年品藻二十四人撰録二百三十四詩叙云名不副實才不合道縱權壓梁竇終無取焉唯以建詩一十五首列於卷端尤稱弔王將軍一篇以為潘嶽弗如也惜其淪於下僚且曰高才無貴士誠哉是言可謂感慨極矣據唐藝文志及通考俱云一卷今流傳詩五十有七首不知何人類而析之為三卷又見洪魏公載吳故宫一絶因附焉隱湖毛晉識
